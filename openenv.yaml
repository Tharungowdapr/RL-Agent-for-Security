name: security_triage_env
description: RL environment for cybersecurity triage using real CVE, EPSS, and KEV data

tasks:
  easy:
    description: "Prioritize vulnerabilities based strictly on simple severity (CVSS score)."
  medium:
    description: "Prioritize vulnerabilities by weighing base severity against EPSS exploit probability."
  hard:
    description: "Full triage simulation calculating probability across severity, EPSS, and CISA KEV catalog with duplicate penalties."

observation_space:
  type: list
  description: Array of active CVE objects detailing their CVSS baseline severity, real-time EPSS score, and KEV presence.

action_space:
  type: discrete
  actions: [prioritize]

reward:
  type: continuous
  range: [-0.5, 1.2]

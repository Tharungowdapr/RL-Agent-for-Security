name: security_triage_env
description: RL environment for cybersecurity triage using real CVE, EPSS, and KEV data

tasks:
  easy:
    description: Select highest severity vulnerability
  medium:
    description: Use severity + EPSS
  hard:
    description: Full prioritization with KEV and penalties

observation_space:
  type: list
  description: Array of active CVE objects detailing their CVSS baseline severity, real-time EPSS score, and KEV presence.

action_space:
  type: discrete
  actions: [prioritize]

reward:
  type: continuous
  range: [-0.5, 1.2]

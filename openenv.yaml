name: security_triage_env
description: RL environment for cybersecurity triage using real CVE, EPSS, and KEV data

tasks:
  easy:
    description: Select the highest severity vulnerability
  medium:
    description: Prioritize vulnerabilities using severity and EPSS
  hard:
    description: Full triage using severity, EPSS, KEV, and penalties

observation_space:
  type: list
  description: CVEs with id, severity, EPSS, KEV, asset criticality

action_space:
  type: discrete
  actions:
    - prioritize

reward:
  type: continuous
  range: [0.0, 1.0]
